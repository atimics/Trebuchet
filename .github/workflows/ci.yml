name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check:syntax

      # public/app.js is a generated artifact: build-app-js.mjs concatenates
      # public/modules/* (the modules now tile app.js exactly). Rebuild it and
      # fail if the committed copy differs from a fresh build. Catches editing
      # app.js directly (lost on next build) and editing a module without
      # rebuilding (a stale bundle would ship).
      - name: Verify app.js is in sync with modules
        run: |
          npm run build:js
          git diff --exit-code -- public/app.js \
            || (echo '::error::public/app.js is out of sync with public/modules/*. Run "npm run build:js" and commit the result.' && exit 1)

      # Guards against the recurring bug where a new module is imported but
      # not added to package.json's "files"/"build.files". It works in dev
      # (runs from source) but is silently missing from the packaged Electron
      # app. The script computes the runtime import closure from main.js and
      # fails if any reachable file isn't listed in both arrays.
      - name: Verify package.json file lists cover all runtime modules
        run: npm run check:package

      - name: Unit tests
        run: npm test

      # F17: critical issues block the build outright.
      - name: Critical audit gate
        run: npm audit --audit-level=critical

      # F17: high-severity issues are reported on every PR but do NOT block
      # yet — there is a known high-severity chain (bigint-buffer, pulled in
      # transitively by @solana/spl-token and the Raydium SDK) that can only
      # be cleared by a dependency bump (see F6/F17). Once that bump lands and
      # this step passes, remove continue-on-error to make high severity
      # blocking like critical.
      - name: High audit report (non-blocking until dep bump)
        continue-on-error: true
        run: npm audit --audit-level=high

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            smoke_command: npm exec electron-builder -- --mac --arm64 --dir --publish=never
            artifact: trebuchet-macos-arm64
          - name: Windows
            os: windows-latest
            smoke_command: npm exec electron-builder -- --win --dir --publish=never
            artifact: trebuchet-windows
          - name: Linux
            os: ubuntu-latest
            smoke_command: npm exec electron-builder -- --linux --dir --publish=never
            artifact: trebuchet-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-cache-${{ runner.os }}-${{ matrix.artifact }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-${{ matrix.artifact }}-

      - name: Install dependencies
        run: npm ci

      - name: Build vanity keygen binary
        # Same rationale as release.yml: c/build/ is gitignored, the
        # asarUnpack pattern packages whatever's in it, so the smoke
        # build needs the binary present or it silently produces a
        # vanity-less package. Catching that here prevents a regression
        # from sliding all the way to a release.
        shell: bash
        run: npm run build:c

      - name: Build package smoke
        run: ${{ matrix.smoke_command }}
