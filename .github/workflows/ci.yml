name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check:syntax

      - name: Unit tests
        run: npm test

      - name: Critical audit gate
        run: npm audit --audit-level=critical

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            smoke_command: npm exec electron-builder -- --mac --arm64 --dir --publish=never
            artifact: trebuchet-macos-arm64
          - name: Windows
            os: windows-latest
            smoke_command: npm exec electron-builder -- --win --dir --publish=never
            artifact: trebuchet-windows
          - name: Linux
            os: ubuntu-latest
            smoke_command: npm exec electron-builder -- --linux --dir --publish=never
            artifact: trebuchet-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-cache-${{ runner.os }}-${{ matrix.artifact }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-${{ matrix.artifact }}-

      - name: Install dependencies
        run: npm ci

      - name: Build package smoke
        run: ${{ matrix.smoke_command }}

  e2e:
    name: E2E UI Flows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: node test/e2e/ui-flows.mjs 01 02 03 07 08 09 --mobile

      - name: Convert videos to GIF
        if: always()
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          for f in test/e2e/videos/*.webm; do
            name="${f%.webm}"
            ffmpeg -y -i "$f" -vf "fps=6,scale=640:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" -loop 0 "${name}.gif" 2>/dev/null
          done

      - name: Build tutorial page
        if: always()
        run: |
          mkdir -p _tutorial
          cp test/e2e/videos/*.gif _tutorial/ 2>/dev/null || true
          cp test/e2e/tutorial.html _tutorial/index.html

      - name: Upload tutorial artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-walkthrough
          path: _tutorial
          if-no-files-found: ignore
