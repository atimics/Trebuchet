name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check:syntax

      - name: Unit tests
        run: npm test

      - name: Critical audit gate
        run: npm audit --audit-level=critical

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run build:mac -- --publish=never
            artifact: trebuchet-macos
            paths: |
              dist/*.dmg
              dist/*.zip
          - name: Windows
            os: windows-latest
            command: npm run build:win -- --publish=never
            artifact: trebuchet-windows
            paths: |
              dist/*.exe
              dist/*.yml
          - name: Linux
            os: ubuntu-latest
            command: npm run build:linux -- --publish=never
            artifact: trebuchet-linux
            paths: |
              dist/*.AppImage
              dist/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: ${{ matrix.command }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
