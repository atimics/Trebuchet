name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check:syntax

      - name: Unit tests
        run: npm test

      - name: Critical audit gate
        run: npm audit --audit-level=critical

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            smoke_command: npm exec electron-builder -- --mac --arm64 --dir --publish=never
            release_command: npm exec electron-builder -- --mac --arm64 --publish=never
            artifact: trebuchet-macos-arm64
            paths: dist/*.dmg
          - name: macOS x64
            os: macos-15-intel
            smoke_command: npm exec electron-builder -- --mac --x64 --dir --publish=never
            release_command: npm exec electron-builder -- --mac --x64 --publish=never
            artifact: trebuchet-macos-x64
            paths: dist/*.dmg
          - name: Windows
            os: windows-latest
            smoke_command: npm exec electron-builder -- --win --dir --publish=never
            release_command: npm exec electron-builder -- --win --publish=never
            artifact: trebuchet-windows
            paths: |
              dist/*.exe
              dist/latest*.yml
          - name: Linux
            os: ubuntu-latest
            smoke_command: npm exec electron-builder -- --linux --dir --publish=never
            release_command: npm exec electron-builder -- --linux --publish=never
            artifact: trebuchet-linux
            paths: dist/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-cache-${{ runner.os }}-${{ matrix.artifact }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-${{ matrix.artifact }}-

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build package smoke
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: ${{ matrix.smoke_command }}

      - name: Build release package
        if: github.event_name == 'workflow_dispatch'
        run: ${{ matrix.release_command }}

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
