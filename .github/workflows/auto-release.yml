name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  version:
    name: Compute and tag release
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Read merged PR labels
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          labels="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '[.[0].labels[]?.name] | @json'
          )"
          echo "labels=${labels}" >> "$GITHUB_OUTPUT"

      - name: Compute next tag
        id: next
        env:
          PR_LABELS_JSON: ${{ steps.pr.outputs.labels }}
        run: |
          git fetch --tags origin
          tags_json="$(
            git tag --list 'v*' |
            node -e "const fs = require('node:fs'); const tags = fs.readFileSync(0, 'utf8').trim().split(/\s+/).filter(Boolean); console.log(JSON.stringify(tags));"
          )"
          RELEASE_TAGS_JSON="${tags_json}" node scripts/auto-version.mjs

      - name: Push tag and start release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next.outputs.tag }}" -m "Trebuchet ${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"
          gh workflow run release.yml --ref "${{ steps.next.outputs.tag }}"
