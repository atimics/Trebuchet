name: Screenshots

# Regenerates the README screenshots by driving the REAL app through a
# complete demo-mode launch with Playwright (scripts/capture-screenshots.mjs)
# and commits the result when anything changed.
#
# Why commit rather than attach as artifacts: the README displays these
# images directly from the repo, so they have to live in docs/screenshots/.
# Filenames are stable — a regeneration overwrites in place and the diff
# shows exactly which screens changed.

# Two modes:
#   - pull_request: capture and upload the images as a workflow ARTIFACT
#     (downloadable from the PR's checks page) so the output can be
#     previewed WITHOUT merging. Nothing is committed.
#   - push to main / manual dispatch: capture and COMMIT the result to
#     docs/screenshots/ so the README displays it.
on:
  pull_request:
    paths:
      - 'public/**'
      - 'server.js'
      - 'demoChainService.js'
      - 'scripts/capture-screenshots.mjs'
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'server.js'
      - 'demoChainService.js'
      - 'scripts/capture-screenshots.mjs'
  workflow_dispatch:

permissions:
  contents: write

# One regeneration at a time per ref; a newer push supersedes an
# in-flight run, and PR runs never cancel main runs.
concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Capture README screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # ffmpeg stitches the happy-path GIF from milestone frames. The
      # capture script skips the GIF gracefully if this is missing, but
      # in CI we want it present so launch-flow.gif stays current.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # The capture drives the committed UI; rebuild app.js so the shots
      # reflect the modules as of this commit (CI separately verifies the
      # committed bundle is in sync, so this is belt and braces).
      - name: Rebuild app.js
        run: npm run build:js

      - name: Capture screenshots
        # The 3D coin stays OFF in CI (no SHOTS_COIN). It was tried twice:
        # SwiftShader on a 2-vCPU runner stalls the renderer main thread
        # during coin re-init on step transitions — first starving click
        # actionability, then the step-transition wait itself. Capture
        # retries can absorb slow screenshots but not an unbounded main-
        # thread stall. Locally the coin works: SHOTS_COIN=1 npm run shots.
        run: npm run shots

      # PR mode: publish the output as a downloadable artifact for review.
      # Open the PR's checks page → this run → "readme-screenshots".
      - name: Upload screenshots artifact (PR preview)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: readme-screenshots
          path: docs/screenshots/
          retention-days: 14

      # Main mode: commit only when pixels actually changed. [skip ci]
      # prevents the bot commit from re-triggering workflows (including
      # this one — the paths filter wouldn't match docs/**, but
      # auto-release watches main).
      - name: Commit updated screenshots
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "Screenshots unchanged — nothing to commit."
          else
            git commit -m "docs: regenerate README screenshots [skip ci]"
            # auto-release may have pushed a chore(release) commit to main
            # while this job ran — rebase our single docs commit on top so
            # the push can't fail non-fast-forward.
            git pull --rebase origin main
            git push
          fi
