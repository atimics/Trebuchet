name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Release ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      TREBUCHET_RELEASE_TARGET: ${{ matrix.target }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: macos-arm64
            artifact: release-macos-arm64
            paths: |
              dist/*.dmg
              dist/release-metadata/*.json
          - name: macOS x64
            os: macos-15-intel
            target: macos-x64
            artifact: release-macos-x64
            paths: |
              dist/*.dmg
              dist/release-metadata/*.json
          - name: Windows
            os: windows-latest
            target: windows
            artifact: release-windows
            paths: |
              dist/*.exe
              dist/latest*.yml
              dist/release-metadata/*.json
          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact: release-linux
            paths: |
              dist/*.AppImage
              dist/*.deb
              dist/release-metadata/*.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Apply release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != v* ]]; then
            echo "Release workflow must run from a v* tag."
            exit 1
          fi
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-cache-${{ runner.os }}-${{ matrix.artifact }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-${{ matrix.artifact }}-

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        run: node scripts/release-build.mjs

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TREBUCHET_RELEASE_ASSET_DIR: release-assets
        run: node scripts/publish-release.mjs

  package:
    name: Publish GitHub Package
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          registry-url: https://npm.pkg.github.com
          scope: '@anoversizedmoosewithsocks'

      - name: Apply release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != v* ]]; then
            echo "Release workflow must run from a v* tag."
            exit 1
          fi
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"

          if npm view "${package_name}@${package_version}" --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published."
            exit 0
          fi

          npm publish

  website:
    name: Publish Website
    needs: publish
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ vars.FTP_HOST != '' && vars.FTP_HOST || 'makesometokens.com' }}
      FTP_PROTOCOL: ${{ vars.FTP_PROTOCOL != '' && vars.FTP_PROTOCOL || 'ftp' }}
      FTP_REMOTE_DIR: ${{ vars.FTP_REMOTE_DIR != '' && vars.FTP_REMOTE_DIR || '.' }}
      FTP_LOGIN: ${{ secrets.FTP_LOGIN }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Publish website
        run: |
          if [ -z "$FTP_LOGIN" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "FTP_LOGIN and FTP_PASSWORD must be configured."
            exit 1
          fi

          lftp -u "$FTP_LOGIN","$FTP_PASSWORD" "${FTP_PROTOCOL}://${FTP_HOST}" <<EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:reconnect-interval-base 5
          mirror -R --only-newer --verbose=2 website "${FTP_REMOTE_DIR}"
          bye
          EOF
