name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Release ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      TREBUCHET_RELEASE_TARGET: ${{ matrix.target }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: macos-arm64
            artifact: release-macos-arm64
            paths: |
              dist/*.dmg
              dist/release-metadata/*.json
          - name: macOS x64
            os: macos-15-intel
            target: macos-x64
            artifact: release-macos-x64
            paths: |
              dist/*.dmg
              dist/release-metadata/*.json
          - name: Windows
            os: windows-latest
            target: windows
            artifact: release-windows
            paths: |
              dist/*.exe
              dist/latest*.yml
              dist/release-metadata/*.json
          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact: release-linux
            paths: |
              dist/*.AppImage
              dist/*.deb
              dist/release-metadata/*.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Apply release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != v* ]]; then
            echo "Release workflow must run from a v* tag."
            exit 1
          fi
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-cache-${{ runner.os }}-${{ matrix.artifact }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-${{ matrix.artifact }}-

      - name: Install system dependencies
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update -qq
              sudo apt-get install -y -qq libarchive-tools libsodium-dev pkg-config rpm
              ;;
            macOS)
              brew install libsodium pkg-config 2>/dev/null || true
              ;;
            Windows)
              vcpkg install libsodium:x64-mingw-static
              vcpkg_root="${VCPKG_INSTALLATION_ROOT:-C:/vcpkg}"
              echo "SODIUM_INCLUDE_DIR=${vcpkg_root}/installed/x64-mingw-static/include" >> "$GITHUB_ENV"
              echo "SODIUM_LIB_DIR=${vcpkg_root}/installed/x64-mingw-static/lib" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Build vanity keygen binary
        # The C binary is what backs the Vanity CA feature. c/build/ is
        # gitignored and package.json's asarUnpack pattern packages
        # whatever's in c/build/, so this step has to run before
        # electron-builder or the release will ship without vanity
        # support. GitHub Actions runners have gcc/clang available by
        # default on all three platforms (Strawberry Perl on Windows,
        # Xcode CLI tools on macOS, build-essential pre-installed on
        # Ubuntu), so build-c.mjs finds a compiler without extra
        # setup. If a runner image ever drops the toolchain, this step
        # fails loudly rather than silently shipping a broken release.
        shell: bash
        run: npm run build:c

      - name: Build release assets
        run: node scripts/release-build.mjs

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  ui-capture:
    name: Capture UI GIFs
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Capture UI GIFs
        run: node test/e2e/ui-flows.mjs 01 02 03 04 05 06 07 08 09 --mobile

      - name: Convert videos to GIF
        run: |
          for f in test/e2e/videos/*.webm; do
            name="${f%.webm}"
            ffmpeg -y -i "$f" -vf "fps=6,scale=640:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" -loop 0 "${name}.gif" 2>/dev/null
          done

      - name: Upload UI GIFs
        uses: actions/upload-artifact@v7
        with:
          name: ui-gifs
          path: test/e2e/videos/*.gif
          if-no-files-found: ignore

  publish:
    name: Publish GitHub Release
    needs: [build, ui-capture]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TREBUCHET_RELEASE_ASSET_DIR: release-assets
        run: node scripts/publish-release.mjs

  package:
    name: Publish GitHub Package
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          registry-url: https://npm.pkg.github.com
          scope: '@anoversizedmoosewithsocks'

      - name: Apply release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != v* ]]; then
            echo "Release workflow must run from a v* tag."
            exit 1
          fi
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"

          if npm view "${package_name}@${package_version}" --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published."
            exit 0
          fi

          npm publish

  website:
    name: Publish Website
    needs: publish
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ vars.FTP_HOST != '' && vars.FTP_HOST || 'p1401.use1.mysecurecloudhost.com' }}
      FTP_PROTOCOL: ${{ vars.FTP_PROTOCOL != '' && vars.FTP_PROTOCOL || 'ftp' }}
      FTP_REMOTE_DIR: ${{ vars.FTP_REMOTE_DIR != '' && vars.FTP_REMOTE_DIR || '.' }}
      FTP_LOGIN: ${{ secrets.FTP_LOGIN }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Before doing anything else, confirm that every download link the
      # website is about to advertise actually exists on the just-published
      # GitHub release. This catches the case where electron-builder's
      # naming drifts (e.g. an electron-builder upgrade changes a default,
      # or someone edits an artifactName in package.json) — without this
      # gate, the build and publish steps would pass and we'd ship a
      # website full of 404s.
      #
      # The expected[] list MUST stay in sync with the href="..." URLs in
      # website/index.html. If you change one, change the other.
      - name: Verify release assets exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ]; then
            echo "Could not derive version from GITHUB_REF_NAME=${GITHUB_REF_NAME}"
            exit 1
          fi

          # The six artifact filenames we hard-code into the website.
          # Hyphens (not spaces) are used in the Windows names because
          # electron-builder silently rewrites spaces to dots in NSIS
          # and portable artifact names for URL-safety. Keeping hyphens
          # in the package.json templates avoids that surprise rewrite
          # and matches the macOS/Linux naming pattern.
          expected=(
            "Trebuchet-${version}-arm64.dmg"
            "Trebuchet-${version}-x64.dmg"
            "Trebuchet-${version}-Setup.exe"
            "Trebuchet-${version}-Portable.exe"
            "Trebuchet-${version}-x86_64.AppImage"
            "trebuchet-desktop_${version}_amd64.deb"
          )

          # gh release view returns one asset name per line.
          assets="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')"

          missing=0
          for f in "${expected[@]}"; do
            # grep -Fxq: fixed-string, whole-line, quiet. Handles spaces
            # in the Windows filenames cleanly without shell quoting issues.
            if ! printf '%s\n' "$assets" | grep -Fxq "$f"; then
              echo "Missing release asset: $f"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo
            echo "Refusing to publish the website — one or more download links would 404."
            echo "Assets actually present on the release:"
            printf '%s\n' "$assets" | sed 's/^/  /'
            exit 1
          fi
          echo "All expected artifacts present in release ${GITHUB_REF_NAME}."

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      # Replace every occurrence of the __TREBUCHET_VERSION__ placeholder
      # in the website HTML with the actual release version (e.g. 1.0.1).
      # The placeholder is used in:
      #   - download URLs (artifact filenames + release tag path)
      #   - the footer "v..." line
      #   - the GitHub release link in the verification note
      # This runs before lftp so the deployed file has real version
      # numbers baked in. The placeholder string is chosen to be
      # unique enough that there's no risk of a stray sed hit.
      - name: Stamp version into website
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ]; then
            echo "Could not derive version from GITHUB_REF_NAME=${GITHUB_REF_NAME}"
            exit 1
          fi
          sed -i "s/__TREBUCHET_VERSION__/${version}/g" website/index.html
          # Sanity check: confirm the placeholder is fully gone, so a
          # botched substitution can't ship broken download links.
          if grep -q "__TREBUCHET_VERSION__" website/index.html; then
            echo "Version placeholder still present after substitution."
            grep -n "__TREBUCHET_VERSION__" website/index.html
            exit 1
          fi
          echo "Stamped version ${version} into website/index.html"

      - name: Publish website
        run: |
          if [ -z "$FTP_LOGIN" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "FTP_LOGIN and FTP_PASSWORD must be configured."
            exit 1
          fi

          lftp -u "$FTP_LOGIN","$FTP_PASSWORD" "${FTP_PROTOCOL}://${FTP_HOST}" <<EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:reconnect-interval-base 5
          mirror -R --only-newer --no-perms --verbose=2 website "${FTP_REMOTE_DIR}"
          bye
          EOF
